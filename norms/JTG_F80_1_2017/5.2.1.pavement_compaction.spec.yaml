logic:
  language: specir/v1
  execution_mode: deterministic
  stages:
    - inputs
    - path
    - gate
    - state
    - proof

inputs:
  input_dto:
    stake:
      type: string
      required: true
    layer_type:
      type: enum
      required: false
      enum_values: ["base", "subbase"]
      default: base
    zone_type:
      type: enum
      required: false
      enum_values: ["Z96", "Z98"]
      default: Z98
    compaction_degree:
      type: number
      unit: "%"
      precision: 2
      required: true
    representative_value:
      type: number
      unit: "%"
      precision: 2
      required: false
    actor_did:
      type: string
      required: true
    inspected_at:
      type: string
      required: true
    project_id:
      type: string
      required: true
    override_requested:
      type: boolean
      required: false
      default: false
    override_evidence:
      type: object
      required: false
    archive_requested:
      type: boolean
      required: false
      default: false

path:
  steps:
    - step_id: resolve_standard
      action: lookup
      lookup_ref: standard_by_zone
      input_fields: [zone_type]
      output_field: standard_value
    - step_id: resolve_tolerance
      action: lookup
      lookup_ref: tolerance_by_zone
      input_fields: [zone_type]
      output_field: tolerance
    - step_id: calc_lower_bound
      action: formula
      formula_ref: lower_bound_formula
      output_field: lower_bound
    - step_id: resolve_representative
      action: formula
      formula_ref: representative_formula
      output_field: representative_value_resolved

  formulas:
    lower_bound_formula: standard_value - tolerance
    representative_formula: if(exists(representative_value), representative_value, compaction_degree)

  lookup_tables:
    standard_by_zone:
      Z96: 96
      Z98: 98
    tolerance_by_zone:
      Z96: 2
      Z98: 2

  derived_fields:
    - standard_value
    - tolerance
    - lower_bound
    - representative_value_resolved

gate:
  rules:
    - rule_id: single_point_rule
      condition: compaction_degree >= lower_bound
      severity: blocking
      on_fail: block
      clause_refs: [JTG_F80_1_2017.5.2.1.single_point]
    - rule_id: representative_rule
      condition: representative_value_resolved >= standard_value
      severity: critical
      on_fail: critical
      clause_refs: [JTG_F80_1_2017.5.2.1.representative]
    - rule_id: override_evidence_rule
      condition: override_requested == False or exists(override_evidence)
      severity: blocking
      on_fail: manual_override
      clause_refs: [JTG_F80_1_2017.override]
  references:
    - JTG_F80_1_2017.5.2.1
  clause_refs:
    - JTG_F80_1_2017.5.2.1

