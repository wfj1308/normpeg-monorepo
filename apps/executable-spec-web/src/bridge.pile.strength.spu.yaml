spuId: "highway.bridge.pile.strength.quality@v1"

meta:
  name: "Bridge Pile Strength"
  norm: "JTG/T 3650-2020"
  clause: "6.3.4"
  version: "v1"

forms:
  - formCode: "BRIDGE_PILE_STRENGTH_FORM"
    role: "lab"
    required: true

data:
  inputs:
    - name: measuredStrength
      type: number
      label: "Measured compressive strength (MPa)"
    - name: designStrength
      type: number
      label: "Design strength (MPa)"
    - name: pileLength
      type: number
      label: "Pile length (m)"
  outputs:
    - name: pileStrength
    - name: strengthRatio
    - name: lengthCheck

path:
  - step: calc_pile_strength
    formula: "pileStrength = measuredStrength"
  - step: calc_strength_ratio
    formula: "strengthRatio = (pileStrength / designStrength) * 100"
  - step: calc_length_check
    formula: "lengthCheck = pileLength"

rules:
  - ruleId: "RULE-PILE-STRENGTH-001"
    field: "strengthRatio"
    operator: ">="
    value: 100
    message: "Measured pile strength must be at least design strength."

proof:
  resultField: "strengthRatio"
  passMessage: "Pile strength meets acceptance criteria."
  failMessage: "Pile strength does not meet acceptance criteria."
  requiredSignatures:
    - lab
    - supervision
