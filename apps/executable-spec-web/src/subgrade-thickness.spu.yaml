spuId: "highway.subgrade.thickness.4.2.3@v1"

meta:
  name: "路基厚度"
  norm: "JTG F80/1-2017"
  clause: "4.2.3"
  version: "v1"

forms:
  - formCode: "SUBGRADE_THICKNESS_FORM"
    role: "lab"
    required: true

data:
  inputs:
    - name: measuredThickness
      type: number
      label: "实测厚度(mm)"
    - name: designThickness
      type: number
      label: "设计厚度(mm)"
  outputs:
    - name: thicknessValue
    - name: thicknessRatio

path:
  - step: calc_thickness_value
    formula: "thicknessValue = measuredThickness"
  - step: calc_thickness_ratio
    formula: "thicknessRatio = (thicknessValue / designThickness) * 100"

rules:
  - ruleId: "RULE-THICKNESS-001"
    field: "thicknessValue"
    operator: ">="
    value: 180
    message: "实测厚度必须满足设计厚度"

proof:
  resultField: "thicknessValue"
  passMessage: "厚度达标"
  failMessage: "厚度不达标"
  requiredSignatures:
    - lab
    - supervision
