spuId: "highway.pavement.flatness.IRI@v1"

meta:
  name: "Pavement Flatness (IRI)"
  norm: "JTG F80/1-2017"
  clause: "4.2.9"
  version: "v1"

forms:
  - formCode: "PAVEMENT_FLATNESS_IRI_FORM"
    role: "lab"
    required: true

data:
  inputs:
    - name: iriMeasured
      type: number
      label: "Measured IRI (m/km)"
    - name: iriLimit
      type: number
      label: "IRI limit (m/km)"
  outputs:
    - name: iriValue
    - name: iriMargin

path:
  - step: calc_iri_value
    formula: "iriValue = iriMeasured"
  - step: calc_iri_margin
    formula: "iriMargin = iriLimit - iriValue"

rules:
  - ruleId: "RULE-FLATNESS-IRI-001"
    field: "iriValue"
    operator: "<="
    value: "**INPUT**:iriLimit"
    message: "IRI must be less than or equal to the limit."

proof:
  resultField: "iriValue"
  passMessage: "IRI flatness meets acceptance criteria."
  failMessage: "IRI flatness does not meet acceptance criteria."
  requiredSignatures:
    - lab
    - supervision
